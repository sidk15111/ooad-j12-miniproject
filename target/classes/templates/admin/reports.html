<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Reports</title>
    <style>
        body { margin:0; font-family:"Gill Sans", sans-serif; background:#f4f6ef; color:#1f2937; }
        .container { width:min(980px,94vw); margin:24px auto; display:grid; gap:12px; }
        .panel { background:#fff; border:1px solid #dbe3ef; border-radius:12px; padding:16px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
        .ghost { text-decoration:none; border:1px solid #cbd5e1; color:#0f172a; background:#fff; padding:7px 10px; border-radius:8px; }
        .msg { padding:8px 10px; border-radius:8px; margin-bottom:8px; font-weight:600; }
        .ok { background:#dcfce7; color:#166534; }
        .err { background:#fee2e2; color:#b91c1c; }
        form { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        input, select, button { padding:8px 10px; font:inherit; }
        button { border:none; border-radius:8px; color:#fff; background:#0f766e; cursor:pointer; }
        button.alt { background:#1d4ed8; }
        pre { white-space:pre-wrap; background:#0b1020; color:#f8fafc; border-radius:10px; padding:14px; overflow:auto; }
    </style>
</head>
<body>
<div class="container">
    <section class="panel">
        <div class="topbar">
            <h1 style="margin:0;">Report Generation</h1>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <a class="ghost" th:href="@{/admin/dashboard}">Admin Home</a>
                <a class="ghost" th:href="@{/}">Home</a>
            </div>
        </div>
        <div th:if="${success}" class="msg ok" th:text="${success}"></div>
        <div th:if="${error}" class="msg err" th:text="${error}"></div>
    </section>

    <section class="panel">
        <h2 style="margin-top:0;">Generate Report</h2>
        <form th:action="@{/admin/reports/generate}" method="post">
            <select name="type" required>
                <option value="daily" th:selected="${reportType == 'daily'}">Daily</option>
                <option value="weekly" th:selected="${reportType == 'weekly'}">Weekly</option>
            </select>
            <input type="date" name="date" th:value="${reportDate}" required>
            <button type="submit">Generate</button>
        </form>

        <form th:action="@{/admin/reports/export}" method="post" style="margin-top:10px;">
            <input type="hidden" name="type" th:value="${reportType}">
            <input type="hidden" name="date" th:value="${reportDate}">
            <button class="alt" type="submit">Export as .txt</button>
        </form>
    </section>

    <section class="panel" th:if="${reportResult}">
        <h2 style="margin-top:0;">Report Output</h2>
        <pre th:text="${reportResult}"></pre>
    </section>
</div>
</body>
</html>
