<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Sessions</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: #f5f7f2; color: #1f2937; }
        .container { width: min(1100px, 95vw); margin: 24px auto; }
        .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        .top-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .ghost { text-decoration: none; border: 1px solid #cbd5e1; color: #0f172a; background: #fff; padding: 7px 10px; border-radius: 8px; font-size: 0.95rem; }
        form { display: inline-flex; gap: 8px; margin: 2px; }
        input, button { padding: 8px 10px; font: inherit; }
        button { border: none; border-radius: 8px; color: white; background: #0f766e; cursor: pointer; }
        button.alt { background: #0369a1; }
        button.warn { background: #475569; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #e5e7eb; padding: 9px; text-align: left; }
        .msg { padding: 8px 10px; border-radius: 8px; margin-bottom: 8px; font-weight: 600; }
        .ok { background: #dcfce7; color: #166534; }
        .err { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>
<div class="container">
    <section class="panel">
        <div class="topbar">
            <h1>Service Staff Sessions</h1>
            <div class="top-actions">
                <a class="ghost" th:href="@{/}">Home</a>
                <a class="ghost" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}">Admin</a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit">Logout</button>
                </form>
            </div>
        </div>
        <div th:if="${success}" class="msg ok" th:text="${success}"></div>
        <div th:if="${error}" class="msg err" th:text="${error}"></div>

        <div>
            <p><strong>Session ID:</strong> <span th:text="${serviceSession.id}"></span></p>
            <p><strong>Staff:</strong> <span th:text="${serviceSession.staffUsername}"></span></p>
            <p><strong>Status:</strong> <span th:text="${serviceSession.status}"></span></p>
            <p><strong>Assigned Patient:</strong>
                <span th:if="${assignedEntry != null}" th:text="${assignedEntry.id + ' - ' + assignedEntry.customerName}"></span>
                <span th:if="${assignedEntry == null}">None</span>
            </p>
        </div>

        <form th:action="@{/staff/availability/available}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Mark Available</button>
        </form>
        <form th:action="@{/staff/availability/unavailable}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="warn" type="submit">Mark Unavailable</button>
        </form>
        <form th:if="${assignedEntry != null}" th:action="@{/staff/assigned/complete}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="alt" type="submit">Complete Assigned Patient</button>
        </form>
    </section>

    <section class="panel">
        <h2>Queue Snapshot (Waiting/In Progress)</h2>
        <table>
            <thead>
            <tr>
                <th>Queue ID</th>
                <th>Customer</th>
                <th>Type</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(queueSnapshot)}"><td colspan="4">No active queue entries</td></tr>
            <tr th:each="entry : ${queueSnapshot}">
                <td th:text="${entry.id}"></td>
                <td th:text="${entry.customerName}"></td>
                <td th:text="${entry.type}"></td>
                <td th:text="${entry.status}"></td>
            </tr>
            </tbody>
        </table>
    </section>

    
</div>
</body>
</html>
