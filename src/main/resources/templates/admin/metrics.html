<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Metrics</title>
    <style>
        body { margin:0; font-family: Georgia, serif; background: linear-gradient(165deg, #f2f6fb, #f8f5ed); color:#1f2937; }
        .container { width:min(1100px,95vw); margin:24px auto; display:grid; gap:12px; }
        .panel { background:#fff; border:1px solid #dbe3ef; border-radius:12px; padding:16px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
        .ghost { text-decoration:none; border:1px solid #cbd5e1; color:#0f172a; background:#fff; padding:7px 10px; border-radius:8px; }
        .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:10px; }
        table { width:100%; border-collapse:collapse; }
        th, td { border-bottom:1px solid #e5e7eb; padding:8px; text-align:left; }
    </style>
</head>
<body>
<div class="container">
    <section class="panel">
        <div class="topbar">
            <h1 style="margin:0;">Metrics Dashboard</h1>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <a class="ghost" th:href="@{/admin/dashboard}">Admin Home</a>
                <a class="ghost" th:href="@{/}">Home</a>
            </div>
        </div>
    </section>

    <section class="grid">
        <article class="panel">
            <h2 style="margin-top:0;">Appointments</h2>
            <table>
                <tr th:each="entry : ${appointmentBreakdown}">
                    <td th:text="${entry.key}"></td>
                    <td th:text="${entry.value}"></td>
                </tr>
            </table>
        </article>

        <article class="panel">
            <h2 style="margin-top:0;">Queue Entries</h2>
            <table>
                <tr th:each="entry : ${queueBreakdown}">
                    <td th:text="${entry.key}"></td>
                    <td th:text="${entry.value}"></td>
                </tr>
            </table>
        </article>

        <article class="panel">
            <h2 style="margin-top:0;">Service Sessions</h2>
            <table>
                <tr th:each="entry : ${sessionBreakdown}">
                    <td th:text="${entry.key}"></td>
                    <td th:text="${entry.value}"></td>
                </tr>
            </table>
        </article>
    </section>
</div>
</body>
</html>
