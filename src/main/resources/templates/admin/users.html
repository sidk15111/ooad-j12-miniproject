<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users</title>
    <style>
        body { margin:0; font-family:"Segoe UI", sans-serif; background:#f8f4ef; color:#1f2937; }
        .container { width:min(1080px,95vw); margin:24px auto; }
        .panel { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:16px; margin-bottom:12px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
        .ghost { text-decoration:none; border:1px solid #cbd5e1; color:#0f172a; background:#fff; padding:7px 10px; border-radius:8px; }
        .msg { padding:8px 10px; border-radius:8px; margin-bottom:8px; font-weight:600; }
        .ok { background:#dcfce7; color:#166534; }
        .err { background:#fee2e2; color:#b91c1c; }
        table { width:100%; border-collapse:collapse; }
        th, td { border-bottom:1px solid #e5e7eb; padding:9px; text-align:left; }
        form { display:inline-flex; gap:8px; align-items:center; flex-wrap:wrap; margin:0; }
        input, select, button { padding:8px 10px; font:inherit; }
        button { border:none; border-radius:8px; color:#fff; background:#0f766e; cursor:pointer; }
        button.warn { background:#b91c1c; }
    </style>
</head>
<body>
<div class="container">
    <section class="panel">
        <div class="topbar">
            <h1 style="margin:0;">User Management (In-Memory)</h1>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <a class="ghost" th:href="@{/admin/dashboard}">Admin Home</a>
                <a class="ghost" th:href="@{/}">Home</a>
            </div>
        </div>
        <div th:if="${success}" class="msg ok" th:text="${success}"></div>
        <div th:if="${error}" class="msg err" th:text="${error}"></div>
    </section>

    <section class="panel">
        <h2 style="margin-top:0;">Users</h2>
        <table>
            <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(users)}"><td colspan="4">No users</td></tr>
            <tr th:each="u : ${users}">
                <td th:text="${u.username}"></td>
                <td th:text="${u.role}"></td>
                <td th:text="${u.active}"></td>
                <td>
                    <form th:action="@{/admin/users/{username}/approve(username=${u.username})}" method="post">
                        <button type="submit">Approve</button>
                    </form>
                    <form th:action="@{/admin/users/{username}/deactivate(username=${u.username})}" method="post">
                        <button class="warn" type="submit">Deactivate</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="panel">
        <h2 style="margin-top:0;">Add User</h2>
        <form th:action="@{/admin/users/add}" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="text" name="password" placeholder="Password" required>
            <select name="role" required>
                <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
            </select>
            <button type="submit">Add User</button>
        </form>
    </section>
</div>
</body>
</html>
