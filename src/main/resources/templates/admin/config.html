<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Configuration</title>
    <style>
        body { margin: 0; font-family: Verdana, sans-serif; background: #f3f7f2; color: #1f2937; }
        .container { width: min(960px, 94vw); margin: 24px auto; }
        .panel { background: #fff; border: 1px solid #dbe3ef; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
        .ghost { text-decoration:none; border:1px solid #cbd5e1; color:#0f172a; background:#fff; padding:7px 10px; border-radius:8px; }
        form { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        input, select, button { padding:8px 10px; font:inherit; }
        button { border:none; border-radius:8px; color:#fff; background:#0f766e; cursor:pointer; }
        .msg { padding:8px 10px; border-radius:8px; margin-bottom:8px; font-weight:600; }
        .ok { background:#dcfce7; color:#166534; }
        .err { background:#fee2e2; color:#b91c1c; }
    </style>
</head>
<body>
<div class="container">
    <section class="panel">
        <div class="topbar">
            <h1 style="margin:0;">System Configuration</h1>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <a class="ghost" th:href="@{/admin/dashboard}">Admin Home</a>
                <a class="ghost" th:href="@{/}">Home</a>
            </div>
        </div>
        <div th:if="${success}" class="msg ok" th:text="${success}"></div>
        <div th:if="${error}" class="msg err" th:text="${error}"></div>
    </section>

    <section class="panel">
        <h2 style="margin-top:0;">Slot Duration</h2>
        <p>Current value: <strong th:text="${slotDurationMinutes}">30</strong> minutes</p>
        <form th:action="@{/admin/config/slot-duration}" method="post">
            <input type="number" name="slotDurationMinutes" min="1" required>
            <button type="submit">Save Slot Duration</button>
        </form>
    </section>

    <section class="panel">
        <h2 style="margin-top:0;">Queue Strategy</h2>
        <p>Active strategy: <strong th:text="${activeStrategy}">APPOINTMENT_PRIORITY</strong></p>
        <form th:action="@{/admin/config/strategy}" method="post">
            <select name="strategy" required>
                <option th:each="strategy : ${strategies}"
                        th:value="${strategy}"
                        th:selected="${strategy == activeStrategy}"
                        th:text="${strategy}"></option>
            </select>
            <button type="submit">Set Strategy</button>
        </form>
    </section>
</div>
</body>
</html>
