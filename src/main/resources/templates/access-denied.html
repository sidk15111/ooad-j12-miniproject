<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #fef3f2, #f8fafc);
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #1f2937;
        }
        .card {
            width: min(680px, 92vw);
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 16px 35px rgba(30, 41, 59, 0.12);
        }
        h1 { margin: 0 0 10px; }
        p { margin: 8px 0; line-height: 1.55; }
        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        a, button {
            text-decoration: none;
            border: none;
            border-radius: 8px;
            padding: 9px 13px;
            font: inherit;
            cursor: pointer;
        }
        a {
            background: #1d4ed8;
            color: #fff;
        }
        button {
            background: #334155;
            color: #fff;
        }
        .who {
            font-size: 0.95rem;
            color: #475569;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Access Denied</h1>
    <p>You are logged in, but your role does not permit this module.</p>
    <p class="who">Current user: <strong sec:authentication="name">user</strong></p>
    <p>Use the home page to open modules available to your role, or sign in as <strong>admin</strong> to access all modules.</p>

    <div class="actions">
        <a th:href="@{/}">Go Home</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Logout</button>
        </form>
    </div>
</main>
</body>
</html>
